<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>URL Postfix Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <canvas id="confettiCanvas"></canvas>

  <div class="container">
    <div class="topbar">
      <input type="text" id="searchInput" placeholder="Поиск…" autocomplete="off" />
      <button id="addToggleBtn" class="icon-btn" title="Добавить постфикс">+</button>
      <button id="addFolderBtn" class="icon-btn" title="Новая папка"><img src="svg/add_folder_icon.svg" alt="folder_icon">
      <button id="historyToggleBtn" class="icon-btn" title="История"><img src="svg/history_icon.svg" alt="history_icon">
    </div>

    <div class="add-section hidden" id="addSection">
      <input type="text" id="labelInput" placeholder="Название" />
      <input type="text" id="postfixInput" placeholder="theme=dark&lang=ru" />
      <div class="add-row">
        <select id="folderSelect">
          <option value="">Без папки</option>
        </select>
        <button id="addBtn">Сохранить</button>
      </div>
    </div>

    <div id="historySection" class="history-section hidden"></div>

    <div id="tree" class="tree"></div>

    <div id="emptyState" class="empty-state" hidden>
      Пусто. Нажмите <b>+</b>, чтобы добавить постфикс.
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
